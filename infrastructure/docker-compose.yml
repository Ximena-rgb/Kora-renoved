services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-kora_db}
      POSTGRES_USER:     ${DB_USER:-kora_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kora_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kora_user} -d ${DB_NAME:-kora_db}"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15

  api-core:
    build:
      context: ../apps/api-core
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ../storage/uploads:/storage/uploads
      - ../storage/logs:/storage/logs
      - static_files:/app/staticfiles
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  stream-consumer:
    build:
      context: ../apps/api-core
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: []
    command: ["sh", "-c", "sleep 15 && python manage.py run_stream_consumer"]
    volumes:
      - ../storage/logs:/storage/logs
    env_file:
      - ../.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-media:
    build:
      context: ../apps/api-media
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ../storage/uploads:/storage/uploads
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /storage/uploads
      API_CORE_INTERNAL_URL: http://api-core:8000
      PROMETHEUS_PORT: "9102"
    ports:
      - "9102:9102"
    depends_on:
      redis:
        condition: service_healthy
      api-core:
        condition: service_healthy

  worker-ai:
    build:
      context: ../apps/worker-ai
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      API_CORE_INTERNAL_URL: http://api-core:8000
      PROMETHEUS_PORT: "9103"
    ports:
      - "9103:9103"
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/static:ro
      - ../storage/uploads:/media:ro
    depends_on:
      - api-core

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-kora_grafana_2024}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  static_files:
  prometheus_data:
  grafana_data:
