###############################################################################
# Nginx — Reverse proxy + Static File Server
# Kora university-social-platform
###############################################################################

upstream api_core {
    server api-core:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 15M;

    # ── Archivos estáticos Django ──────────────────────────────────
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos media (imágenes procesadas por api-media) ─────────
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        access_log off;

        # Solo imágenes permitidas
        location ~* \.(jpg|jpeg|png|webp|avif|gif)$ {
            try_files $uri =404;
        }
    }

    # ── WebSockets ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://api_core;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API REST ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_core;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS headers (respaldo — Django ya los maneja)
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Django Admin ───────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://api_core;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Métricas Prometheus (solo red interna) ────────────────────
    location /metrics {
        proxy_pass http://api_core;
        allow 172.0.0.0/8;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny  all;
    }

    # ── Health check ───────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
