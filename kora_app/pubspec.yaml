name: kora_app
description: KORA — Conexiones universitarias en tiempo real
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ───────────────────────────────────────────────────
  http: ^1.2.1
  web_socket_channel: ^2.4.0

  # ── Auth / Firebase / Google ─────────────────────────────────────
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  google_sign_in: ^6.2.1

  # ── Storage local ────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── UI / UX ──────────────────────────────────────────────────────
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  timeago: ^3.6.1

  # ── Notificaciones ────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Configuración ─────────────────────────────────────────────────
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

# ── Splash Screen nativo (Android 12+ / iOS) ──────────────────────
flutter_native_splash:
  # Fondo: color oscuro de KORA (#0A0A0F)
  color: "#0A0A0F"
  color_dark: "#0A0A0F"

  # Logo centrado — se genera desde assets/images/splash_logo.png
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png

  # Sin fondo blanco al cambiar al tema normal
  android_12:
    color: "#0A0A0F"
    color_dark: "#0A0A0F"
    image: assets/images/splash_logo.png
    image_dark: assets/images/splash_logo.png
    # Tamaño del icono en Android 12+ (en dp)
    icon_background_color: "#0A0A0F"
    icon_background_color_dark: "#0A0A0F"

  # Android específico
  fullscreen: true

  # iOS
  ios: true
  web: false
